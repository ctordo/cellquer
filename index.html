<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cellquer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />

  </head>

  <body>
    <header>
      <h1>cellquer</h1>
    </header>

    <main>
      <div class="col-left">
        <div class="panel">
          <div class="panel-title">MENU</div>
          <button class="btn" id="reset-btn">reset board</button>
        </div>
        <div class="panel">
          <div class="panel-title">moves played</div>
          <div class="move-counter" id="move-counter">0</div>
          <div class="move-counter-label">total moves</div>
        </div>
      </div>

      <div class="col-center">
        <canvas id="game-canvas"></canvas>
        <div id="turn-indicator">white's turn</div>
      </div>

      <div class="col-right">
        <div class="panel">
          <div class="panel-title">rules</div>
          <div class="rules-text">
            <p>rules.</p>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script type="module" src="/src/main.ts"></script>

</html>
